name: CI

# プルリクのたびに E2E スモークテストを自動実行し、緑✓/赤✗ を表示する。
on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        run: npm install
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Run E2E tests
        run: npx playwright test
